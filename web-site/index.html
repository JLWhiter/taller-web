<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--CSS-->
    <link rel="stylesheet" href="css-contenidos/panel-principal.css">
    <link rel="stylesheet" href="css-contenidos/informacion.css">
    <link rel="stylesheet" href="style.css">

    <!--Tipogafía: Inter-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <title>[NE] - Sistema de Gestión de Reservas</title>
</head>

<body>
    <div class="barra-lateral" id="barra-lateral">
        <div class="titulo-condominio">
            <img src="../images/icons/condominio.png" alt="img-logo">
            <div class="informacion">
                <span class="titulo">Villa Santa Clara</span>
                <span class="subtitulo">Gestión de Reservas</span>
            </div>
        </div>
        <button class="busqueda">
            <img src="../images/icons/lupa.png" alt="lupa">
            <input type="text" placeholder="Buscar">
        </button>
        <div class="secciones">
            <button class="panel-principal">
                <img src="../images/icons/dashboard.png" alt="img-dashboard">
                <span>Panel Principal</span>
            </button>
            <button class="seccion-informacion">
                <img src="../images/icons/informacion.png" alt="img-info">
                <span>Información</span>
            </button>
        </div>
        <footer>
            <button class="encoger" id="minimizar-btn">
                <img src="../images/icons/compactar.png" alt="img-encoger">
                <span>Encoger Barra</span>
            </button>
            <button class="notificacion">
                <img src="../images/icons/notificacion.png" alt="img-notifi">
                <span>Notificaciones</span>
            </button>
            <button class="configuracion">
                <img src="../images/icons/setting.png" alt="img-configuracion">
                <span>Configuración</span>
            </button>
        </footer>
    </div>
    <div class="panel-contenido">
        <header>
            <div class="left">
                <h1 class="titulo-seccion" id="titulo-seccion">Panel Principal</h1>
                <p id="subtitulo-seccion">Gestiona tus reservas de áreas comunes</p>
            </div>
            <div class="right">
                <span class="rol">Residente</span>
                <div class="usuario">
                    <div class="avatar-usuario">
                        <span>E</span>
                    </div>
                    <div class="info-usuario">
                        <span class="nombre-apellido">Emanuel Espinoza</span>
                        <span class="torre-depa">Torre B - Dpto 205</span>
                    </div>
                </div>
                <button class="cerrar-sesion">
                    <img src="../images/icons/salida-dark.png" alt="img-cerrar-sesion">
                    <span>Cerrar Sesión</span>
                </button>
            </div>
        </header>
        <div id="vista"></div>
    </div>
    <script src="main.js"></script>
</body>

</html>
