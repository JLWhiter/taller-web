<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catálogo de cursos para curso de taller web">
    <title>Catalogo de Cursos</title>
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <section class="contenedor-header">
        <nav> 
            <ul>
                <li><a href="catalogo.html" target="_blank">Modo invitado</a></li>
            </ul>
        </nav>
    </section>

    <section class="contendor-login layer-frontal">
        <div class="login">
            <div class="formulario">
                <img src="assets/logo.webp" alt="logo_login">

                <h1>Educate Plataforma</h1>

                <form>
                    <div class="entrada_usuario">
                        <label>Usuario</label>  
                        <input class="entrada_datos" type="text" id="usuario"> 

                        <label>Contraseña</label>  
                        <input class="entrada_datos" type="password" id="password"> 
                    </div>
                    <div class="contendor_btn">
                        <input class="btn_iniciar" type="submit" value="Iniciar Sesion" id="iniciar_sesion">
                        <input class="btn_iniciar" type="submit" value="Registrar" id="ir_registro">
                    </div>
                </form>

            </div>
        </div>
    </section>
    <section class="contenedor-registro layer-trasero">
        <div class="formulario register">
            <img src="assets/logo.webp" alt="logo_login">
            <h1>Educate Plataforma</h1>
            <form>
                <div class="entrada_usuario">
                    <label>Nombre Completo</label>
                    <input class="entrada_datos" type="text" id="nombres">
                    <label>Apellido Completo</label>
                    <input class="entrada_datos" type="text" id="apellidos">
                    <label>DNI</label>
                    <input class="entrada_datos" type="text" id="dni">
                    <label>Usuario</label>
                    <input class="entrada_datos" type="text" id="usuario">
                    <label>Constraseña</label>
                    <input class="entrada_datos" type="password" id="constraseña">
                    <label>Celular</label>
                    <input class="entrada_datos" type="text" id="celular">
                </div>
            </form>
        </div>
    </section>
</body>
</html>
