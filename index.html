<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catálogo de cursos para curso de taller web">
    <title>Catalogo de Cursos</title>
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    
    <section class="contenedor-header">
        <nav> 
            <ul>
                <li><a href="catalogo.html" target="_blank">Modo invitado</a></li>
            </ul>
        </nav>
    </section>

    <section class="contendor-login layer-frontal">
        <div class="login" id="login">
            <div class="formulario">
                <img src="assets/logo.webp" alt="logo_login">

                <h1>Educate Plataforma</h1>

                <form>
                    <div class="entrada_usuario">
                        <h2>Usuario</h2>  
                        <input class="entrada_datos" type="text" id="usuario"> 

                        <h2>Contraseña</h2>  
                        <input class="entrada_datos" type="password" id="password"> 
                    </div>
                    <div class="contendor_btn">
                        <button class="btn_iniciar" type="button" id="iniciar_sesion">Iniciar Sesion</button>
                        <button class="btn_iniciar" type="button" id="ir_registro">Registrar</button>  
                    </div>
                </form>

            </div>
    </section>
    <section class="contenedor-registro layer-trasero" >
        <div class="register" id="register" style="display: none;">
            <div class="formulario">
                <img src="assets/logo.webp" alt="logo_registro">
                <h1>Educate Plataforma</h1>
                <form>
                    <div class="entrada_usuario">
                        <h2>Nombre Completo</h2>
                        <input class="entrada_datos" type="text" id="nombres">
                        <h2>Apellido Completo</h2>
                        <input class="entrada_datos" type="text" id="apellidos">
                        <h2>DNI</h2>
                        <input class="entrada_datos" type="text" id="dni">
                        <h2>Usuario</h2>
                        <input class="entrada_datos" type="text" id="usuario">
                        <h2>Constraseña</h2>
                        <input class="entrada_datos" type="password" id="constraseña">
                        <h2>Celular</h2>
                        <input class="entrada_datos" type="text" id="celular">
                    </div>
                    <div class="contendor_btn">
                        <button class="btn_iniciar" type="button" id="atras">Atras</button>
                        <button class="btn_iniciar" type="button" id="registrar">Registrar</button>
                    </div>                
                </form>
            </div>
        </div>
    </section>
    <script src="js/index.js"></script>
</body>
</html>
