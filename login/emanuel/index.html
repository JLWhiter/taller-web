<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap"
        rel="stylesheet">

    <title>Inicio</title>
</head>

<body>
    <!--Encabezado-->
    <div class="bloque-encabezado">
        <div class="logo-universidad">
            <img class="imagen-logo-universidad" src="images/logo.jpg" alt="logo-universidad">
            <span class="nombre-universidad">Universidad Tecnológica del Perú</span>
        </div>

        <div class="seccion-usuario">
            <span class="rol-usuario">Administrador</span>


            <div class="informacion-usuario">
                <img class="foto-carnet-usuario" src="images/foto-usuario.jpg" alt="foto-usuario">
                <div class="nombre-email">
                    <span class="nombre-usuario">Admin Usuario</span>
                    <span class="email">admin@educativo.com</span>
                </div>
            </div>

            <button class="cerrar-sesion">
                <img class="img-cerrar-sesion" src="images/cerrar-sesion.png" alt="logo-cerrar-sesion">

                <span class="etiqueta-cerrar-sesion">Cerrar sesión</span>
            </button>
        </div>
    </div>

    <!--Contenido-->
    <div class="barra-lateral">
        <div class="bloque-lateral">
            <a href="..." class="button-img"> <!---FALTA PONER URL-->
                <img class="img-boton" src="images/botones-lateral/libros.png" alt="logo-gestion-cursos">
                <span>Gestionar Cursos</span>
            </a>
            <a href="..." class="button-img"> <!---FALTA PONER URL-->
                <img class="img-boton" src="images/botones-lateral/mas.png" alt="logo-gestion-cursos">
                <span>Crear Curso</span>
            </a>
            <a href="..." class="button-img"> <!---FALTA PONER URL-->
                <img class="img-boton" src="images/botones-lateral/configuracion.png" alt="logo-gestion-cursos">
                <span>Configuración</span>
            </a>
        </div>

        <div class="bloque-contenido">

            <div class="introduccion-gestion">
                <h1 class="titulo-gestion-cursos">Gestión de Cursos</h1>
                <p class="descr-gestion-cursos">Administra el catálogo completo de cursos</p>
            </div>

            <div class="bloques-gestion">
                <div class="bloque-gestion">
                    <p class="bg-1">Total Cursos</p>
                    <p class="bg-2">9</p>
                </div>
                <div class="bloque-gestion">
                    <p class="bg-1">Categorías</p>
                    <p class="bg-2">6</p>
                </div>
                <div class="bloque-gestion">
                    <p class="bg-1">Estudiantes</p>
                    <p class="bg-2">18.036</p>
                </div>
                <div class="bloque-gestion">
                    <p class="bg-1">Rating Promedio</p>
                    <p class="bg-2">9</p>
                </div>
            </div>


        </div>
    </div>

</body>

</html>
