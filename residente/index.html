<!doctype html>
<html lang="es">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />

	<!--Google Icons-->
	<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

	<!--CSS-->
	<link rel="stylesheet" href="../root.css" />
	<link rel="stylesheet" href="css/main.css" />

	<!--Tipogafía: Google Sans Flex-->
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
		rel="stylesheet" />

	<title>Villa Santa Clara</title>

</head>

<body>
	<!--CONTENIDO-->
	<main>
		<header>
			<div class="cabecera-titulo">
				<button id="btn-hamburguesa" class="btn-hamburguesa" aria-label="Abrir menú" aria-expanded="false">
					<span class="material-symbols-outlined">menu</span>
				</button>
				<img class="logo-marca"
					src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSI+PHJlY3Qgd2lkdGg9IjI0IiBoZWlnaHQ9IjI0IiByeD0iNiIgZmlsbD0iIzFhMWExOCIvPjxwYXRoIGQ9Ik02IDEyLjUgMTIgN2w2IDUuNSIgc3Ryb2tlPSIjZjFmMWYxIiBzdHJva2Utd2lkdGg9IjEuNiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIi8+PHBhdGggZD0iTTcuNSAxMS4zVjE3aDl2LTUuNyIgc3Ryb2tlPSIjZjFmMWYxIiBzdHJva2Utd2lkdGg9IjEuNiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIi8+PHBhdGggZD0iTTEwLjMgMTd2LTMuNGgzLjRWMTciIHN0cm9rZT0iI2YxZjFmMSIgc3Ryb2tlLXdpZHRoPSIxLjYiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCIvPjwvc3ZnPg=="
					alt="Logo Villa Santa Clara" width="32" height="32">
				<hgroup class="marca">
					<h2>Villa Santa Clara</h2>
					<h1 id="titulo-seccion">Reservación de áreas comunes</h1>
				</hgroup>
			</div>

			<!--PESTAÑAS DE SECCIÓN (ESCRITORIO)-->
			<nav id="nav-principal" aria-label="Secciones">
				<button data-seccion="reservaciones">
					<span class="material-symbols-outlined">calendar_add_on</span>
					<span>Reservas</span>
				</button>
				<button data-seccion="informacion">
					<span class="material-symbols-outlined">info</span>
					<span>Información</span>
				</button>
				<button data-seccion="configuracion">
					<span class="material-symbols-outlined">settings</span>
					<span>Configuración</span>
				</button>
			</nav>

			<div class="header-acciones">
				<button class="btn-circular toggle-tema" aria-label="Cambiar a modo oscuro">
					<span class="material-symbols-outlined">dark_mode</span>
				</button>

				<div class="notificaciones-contenedor">
					<button class="btn-circular" id="btn-notificaciones" aria-label="Notificaciones" aria-haspopup="true"
						aria-expanded="false">
						<span class="material-symbols-outlined">notifications</span>
						<span class="badge" id="badge-notificaciones"></span>
					</button>

					<!--VENTANA FLOTANTE: NOTIFICACIONES-->
					<div class="menu-notificaciones" id="menu-notificaciones">
						<div class="menu-notificaciones-header">
							<h3>Notificaciones</h3>
							<button class="menu-notificaciones-marcar" id="btn-marcar-leidas" type="button">
								Marcar todas como leídas
							</button>
						</div>
						<div class="menu-notificaciones-lista" id="lista-notificaciones"></div>
					</div>
				</div>

				<button class="btn-circular btn-perfil" aria-label="Perfil de usuario" aria-haspopup="true"
					aria-expanded="false">
					EM
				</button>

				<!--VENTANA FLOTANTE: MENÚ DE PERFIL-->
				<div class="menu-perfil" id="menu-perfil">
					<div class="menu-perfil-cabecera">
						<div class="menu-perfil-avatar">EM</div>
						<div class="menu-perfil-datos">
							<span class="menu-perfil-nombre">Emanuel Espinoza</span>
							<span class="menu-perfil-unidad">BL04 · 201</span>
						</div>
					</div>

					<div class="menu-perfil-separador"></div>

					<button class="menu-perfil-item" data-seccion="configuracion" type="button">
						<span class="material-symbols-outlined">person</span>
						<span>Mi perfil</span>
					</button>
					<a class="menu-perfil-item" href="mailto:soporte@villasantaclara.com">
						<span class="material-symbols-outlined">help</span>
						<span>Ayuda y soporte</span>
					</a>

					<div class="menu-perfil-separador"></div>

					<button class="menu-perfil-item menu-perfil-salir" id="btn-cerrar-sesion" type="button">
						<span class="material-symbols-outlined">logout</span>
						<span>Cerrar sesión</span>
					</button>
				</div>
			</div>
		</header>

		<!--MENÚ DESPLEGABLE (MÓVIL)-->
		<nav id="menu-movil" aria-label="Secciones (móvil)">
			<button data-seccion="reservaciones">
				<span class="material-symbols-outlined">calendar_add_on</span>
				<span>Reservas</span>
			</button>
			<button data-seccion="informacion">
				<span class="material-symbols-outlined">info</span>
				<span>Información</span>
			</button>
			<button data-seccion="configuracion">
				<span class="material-symbols-outlined">settings</span>
				<span>Configuración</span>
			</button>
		</nav>

		<div id="vista"></div>
	</main>

	<!--VENTANA FLOTANTE: CONFIRMAR CIERRE DE SESIÓN-->
	<div class="modal-overlay" id="modal-cerrar-sesion-overlay">
		<div class="modal-confirmacion">
			<span class="material-symbols-outlined modal-confirmacion-icono">logout</span>
			<h3>¿Cerrar sesión?</h3>
			<p>Tendrás que volver a iniciar sesión para acceder a tus reservas.</p>
			<div class="modal-confirmacion-acciones">
				<button class="modal-confirmacion-cancelar" id="btn-cancelar-cierre" type="button">Cancelar</button>
				<button class="modal-confirmacion-confirmar" id="btn-confirmar-cierre" type="button">Cerrar
					sesión</button>
			</div>
		</div>
	</div>

	<script type="module" src="js/app.js"></script>
</body>

</html>
