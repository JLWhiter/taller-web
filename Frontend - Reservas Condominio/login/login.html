<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <title>Iniciar sesión - Villa Santa Clara</title>
</head>

<body>
    <div class="left">
        <div class="introduccion">
            <div class="logo-condominio">
                <img src="../images/icons/light-mode-logo.png" alt="logo">
                <span class="titulo">Villa Santa Clara</span>
                <span class="subtitulo">Sistema de Gestión de Reservas</span>
            </div>
        </div>
    </div>

    <div class="right">
        <form>
            <span class="titulo">Buenos días!</span>
            <span class="descripcion">Inicia sesión para poder gestionar tus reservaciones.</span>
            <label class="correo">
                <span>Correo Electrónico</span>
                <input type="email" placeholder="residente@villasantaclara.com">
            </label>
            <label class="password">
                <span>Contraseña</span>
                <input type="password" placeholder="••••••••••">
            </label>
            <div class="recuerdame-recuperacion">
                <div class="recuerdame">
                    <label>
                        <input type="checkbox">
                        <span>Mantener la sesión iniciada</span>
                    </label>
                </div>
                <a href="">¿Perdiste tu contraseña?</a>
            </div>
            <button type="submit">
                <img src="../images/icons/salida-light.png" alt="img-iniciar-sesion">
                <span>Iniciar sesión</span>
            </button>
            <p class="ayuda">¿Necesitas ayuda? <a href="">Contáctanos</a></p>
        </form>
    </div>
    <script src="main.js"></script>
</body>

</html>
