<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <title>Página principal</title>
</head>

<body>
    <div class="barra-lateral">
        <div class="titulo-condominio">
            <img src="../images/icons/light-mode-logo.png" alt="">
            <div class="informacion">
                <span class="titulo">Villa Santa Clara</span>
                <span class="subtitulo">Sistema de Gestión</span>
            </div>
        </div>
        <div class="secciones">
            <button class="panel-principal">
                <img src="../images/icons/dashboard.png" alt="">
                <span>Panel Principal</span>
            </button>
            <button class="Configuracion">
                <img src="../images/icons/settings.png" alt="">
                <span>Configuracion</span>
            </button>
        </div>
        <footer>
            <button class="usuario">
                <div class="avatar-usuario">
                    <span>E</span>
                </div>
                <div class="informacion">
                    <span class="nombre-apellido">Emanuel Espinoza</span>
                    <span class="torre-depa">Torre B - Dpto 205</span>
                </div>
            </button>
            <button class="cerrar-sesion">
                <img src="../images/icons/salida.png" alt="img-cerrar-sesion">
                <span>Cerrar Sesión</span>
            </button>
        </footer>
    </div>
    <div class="contenido">
        <div class="reservas">
            <span>Reservas del Condominio</span>
            <div class="botones">
                <button class="boton-reserva"></button>
                <button class="boton-reserva"></button>
                <button class="boton-reserva"></button>
                <button class="boton-reserva"></button>
            </div>
        </div>
        <div class="Herramientas">
            <span>Herramientas</span>
            <div class="botones">
                <button class="calendario"></button>
                <button class="mis-reservas"></button>
            </div>
        </div>
</body>

</html>
