<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <!--Logo de la Universidad-->
        <div class="logo-universidad">
            <img src="images/logo.jpg" alt="Logo-UTP" class="logo-utp">
            <span>Universidad Tecnológica del Perú</span>
        </div>

        <!--Información del usuario-->
        <div class="header-usuario">
            <span class="rol">Administrador</span>
            <img src="images/foto-usuario.jpg" alt="Foto usuario" class="foto-perfil">
            <div class="informacion-admin">
                <span class="nombre">Admin Usuario</span>
                <span class="email">admin@educativo.com</span>
            </div>
        </div>

        <!--Botón de Cerrar Sesión-->
        <button class="boton-cerrar-sesion">Cerrar Sesión</button>
    </header>
</body>
</html>
